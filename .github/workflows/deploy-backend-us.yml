name: Deploy backend to US

on:
  workflow_run:
    workflows:
      - Verify
    types:
      - completed

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-us
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DEPLOY_PATH: /data/app/customer-service-prod

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout verified commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      APP_IMAGE: ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }}
      SSH_HOST: ${{ secrets.US_DEPLOY_HOST }}
      SSH_PORT: ${{ secrets.US_DEPLOY_PORT }}
      SSH_USER: ${{ secrets.US_DEPLOY_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.US_DEPLOY_SSH_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.US_SSH_KNOWN_HOSTS }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Upload production Compose file
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            docker-compose.production.yml \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/docker-compose.production.yml"

      - name: Log server in to GitHub Container Registry
        run: |
          set -euo pipefail
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "docker login ghcr.io -u '$GITHUB_ACTOR' --password-stdin"

      - name: Deploy verified image
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            bash -s -- "$DEPLOY_PATH" "$APP_IMAGE" <<'REMOTE_SCRIPT'
          set -euo pipefail

          deploy_path="$1"
          app_image="$2"
          cd "$deploy_path"

          compose=(docker compose --env-file .env.production -f docker-compose.production.yml)
          previous_image="$(docker inspect -f '{{.Image}}' shopify-customer-service-app 2>/dev/null || true)"

          APP_IMAGE="$app_image" "${compose[@]}" pull app
          APP_IMAGE="$app_image" "${compose[@]}" up -d app

          healthy=false
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3100/health >/dev/null; then
              healthy=true
              break
            fi
            sleep 5
          done

          if [ "$healthy" != true ]; then
            "${compose[@]}" logs --tail=200 app || true
            if [ -n "$previous_image" ]; then
              echo "Health check failed; rolling back to the previous image."
              APP_IMAGE="$previous_image" "${compose[@]}" up -d app
            fi
            exit 1
          fi

          APP_IMAGE="$app_image" "${compose[@]}" ps
          docker image prune -f
          REMOTE_SCRIPT

      - name: Log server out of GitHub Container Registry
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "docker logout ghcr.io >/dev/null 2>&1 || true"
